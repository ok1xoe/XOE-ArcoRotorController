<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="XOE MacRotorController icon">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="904" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102333"/>
      <stop offset="0.52" stop-color="#071724"/>
      <stop offset="1" stop-color="#04101a"/>
    </linearGradient>
    <linearGradient id="arc" x1="222" y1="196" x2="822" y2="828" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25c4ff"/>
      <stop offset="0.55" stop-color="#1499f2"/>
      <stop offset="1" stop-color="#084f9a"/>
    </linearGradient>
    <linearGradient id="edge" x1="112" y1="80" x2="912" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#88a6ba" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#315066" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000611" flood-opacity="0.48"/>
    </filter>
    <filter id="textShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="70" y="58" width="884" height="884" rx="172" fill="url(#bg)"/>
    <rect x="91" y="79" width="842" height="842" rx="150" fill="none" stroke="url(#edge)" stroke-width="5"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle" filter="url(#textShadow)">
    <g transform="translate(512 188) scale(2.106 0.66)">
      <text x="0" y="0"
            font-size="158"
            font-weight="850"
            letter-spacing="14"
            fill="#25c4ff">XOE</text>
    </g>
    <text x="512" y="716"
          font-size="344"
          font-weight="900"
          letter-spacing="4"
          fill="#f7fbfc">MRC</text>
  </g>
</svg>
